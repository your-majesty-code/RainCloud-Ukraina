<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — RainCloud Ukraina</title>
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <style>
    .auth { min-height: 100vh; display: grid; place-items: center; padding: 40px 24px; }
    .auth-card {
      width: 100%; max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-3xl);
      box-shadow: var(--shadow-glass);
      padding: 40px;
    }
    .auth-brand {
      display: inline-flex; align-items: center; height: 48px; padding: 0 20px;
      background: var(--pill-dark); border-radius: var(--radius-full);
      margin-bottom: 28px;
    }
    .auth-brand img { height: 26px; width: auto; }
    .auth-title { margin: 0 0 8px; }
    .auth-sub { color: var(--ink-500); margin: 0 0 28px; }
    .form { display: flex; flex-direction: column; gap: 18px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 13px; font-weight: 500; color: var(--ink-600); }
    .input {
      width: 100%; height: 48px; padding: 0 16px;
      background: var(--surface); color: var(--text-primary);
      border: 1px solid var(--border); border-radius: var(--radius-md);
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    .input::placeholder { color: var(--ink-400); }
    .input:focus { outline: none; border-color: var(--primary); box-shadow: var(--focus-ring); }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .checkbox { display: inline-flex; align-items: center; gap: 8px; color: var(--ink-500); font-size: 14px; cursor: pointer; }
    .checkbox input { width: 16px; height: 16px; accent-color: var(--primary); }
    .link { color: var(--primary); font-size: 14px; font-weight: 500; }
    .link:hover { color: var(--primary-hover); }
    .btn--block { width: 100%; height: 48px; font-size: 15px; }
    .divider { display: flex; align-items: center; gap: 16px; margin: 22px 0; color: var(--ink-400); font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
    .auth-foot { margin-top: 28px; text-align: center; color: var(--ink-500); font-size: 14px; }
    .auth-foot a { color: var(--primary); font-weight: 500; }
    @media (max-width: 600px) { .auth-card { border: none; box-shadow: none; background: transparent; padding: 24px; } }
  </style>
</head>
<body>
  <div class="app-canvas">
    <main class="auth">
      <section class="auth-card" aria-labelledby="signin-title">
        <span class="auth-brand"><img src="assets/ins-logo.png" alt="RainCloud Ukraina" /></span>
        <h1 class="auth-title t-title" id="signin-title">Welcome back</h1>
        <p class="auth-sub t-body-lg">Sign in to continue building the new Ukraine.</p>

        <form class="form" action="feeds.html" method="get" novalidate>
          <div class="field">
            <label for="email">Email</label>
            <input class="input" type="email" id="email" name="email" autocomplete="email" placeholder="you@example.com" required />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input class="input" type="password" id="password" name="password" autocomplete="current-password" placeholder="Enter your password" required />
          </div>
          <div class="row">
            <label class="checkbox"><input type="checkbox" name="remember" /> Keep me signed in</label>
            <a class="link" href="#">Forgot password?</a>
          </div>
          <button class="btn btn--primary btn--block" type="submit">Sign in</button>
        </form>

        <div class="divider">or</div>

        <button class="btn btn--secondary btn--block" type="button" onclick="window.location.href='feeds.html'">Continue with Google</button>

        <p class="auth-foot">New here? <a href="#">Create an account</a></p>
      </section>
    </main>
  </div>
</body>
</html>
